<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #080b0f;
        --surface: #0e1318;
        --surface2: #141a21;
        --border: rgba(255,255,255,0.06);
        --border-hover: rgba(255,255,255,0.12);
        --accent: #4fffb0;
        --accent-dim: rgba(79,255,176,0.12);
        --accent-glow: rgba(79,255,176,0.3);
        --sent-bg: #1a2e3b;
        --sent-border: rgba(79,255,176,0.2);
        --recv-bg: #0e1318;
        --text: #e8f0f7;
        --text-muted: rgba(232,240,247,0.4);
        --text-dim: rgba(232,240,247,0.2);
        --status-online: #4fffb0;
        --radius: 16px;
        --radius-sm: 10px;
        --font-display: 'Syne', sans-serif;
        --font-mono: 'DM Mono', monospace;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-display);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 60% 40% at 80% 10%, rgba(79,255,176,0.04) 0%, transparent 60%),
          radial-gradient(ellipse 40% 60% at 10% 90%, rgba(30,100,200,0.04) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
      }

      /* Grid overlay */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      /* ── HEADER ── */
      header {
        position: relative;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 28px;
        border-bottom: 1px solid var(--border);
        background: rgba(8,11,15,0.8);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        flex-shrink: 0;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, #1a3a2a, #0a2018);
        border: 1.5px solid var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        font-weight: 700;
        color: var(--accent);
        position: relative;
        flex-shrink: 0;
        box-shadow: 0 0 20px var(--accent-glow);
      }

      .avatar-dot {
        position: absolute;
        bottom: 1px;
        right: 1px;
        width: 9px;
        height: 9px;
        background: var(--status-online);
        border-radius: 50%;
        border: 2px solid var(--bg);
        box-shadow: 0 0 6px var(--accent-glow);
        animation: pulse 2.5s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(0.85); }
      }

      .header-info h1 {
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
        letter-spacing: 0.01em;
      }

      .header-info p {
        font-size: 11px;
        color: var(--accent);
        font-family: var(--font-mono);
        font-weight: 400;
        letter-spacing: 0.05em;
        margin-top: 1px;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .header-badge {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-muted);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 4px 10px;
        letter-spacing: 0.08em;
      }

      /* ── MESSAGES AREA ── */
      #messages-wrapper {
        flex: 1;
        overflow: hidden;
        position: relative;
        z-index: 1;
      }

      #messages {
        list-style: none;
        height: 100%;
        overflow-y: auto;
        padding: 24px 28px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        scroll-behavior: smooth;
      }

      #messages::-webkit-scrollbar { width: 4px; }
      #messages::-webkit-scrollbar-track { background: transparent; }
      #messages::-webkit-scrollbar-thumb {
        background: var(--border-hover);
        border-radius: 4px;
      }

      /* Date divider */
      .date-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 8px 0;
      }
      .date-divider::before,
      .date-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      .date-divider span {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-dim);
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      /* Message bubbles */
      #messages li {
        display: flex;
        flex-direction: column;
        max-width: 72%;
        animation: msgIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      @keyframes msgIn {
        from { opacity: 0; transform: translateY(10px) scale(0.96); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      #messages li.sent {
        align-self: flex-end;
        align-items: flex-end;
      }

      #messages li.received {
        align-self: flex-start;
        align-items: flex-start;
      }

      .bubble {
        padding: 11px 16px;
        border-radius: var(--radius);
        font-size: 14px;
        line-height: 1.55;
        letter-spacing: 0.01em;
        font-weight: 400;
        word-break: break-word;
      }

      .sent .bubble {
        background: var(--sent-bg);
        border: 1px solid var(--sent-border);
        border-bottom-right-radius: 5px;
        color: var(--text);
        box-shadow: 0 0 30px rgba(79,255,176,0.05);
      }

      .received .bubble {
        background: var(--recv-bg);
        border: 1px solid var(--border);
        border-bottom-left-radius: 5px;
        color: var(--text);
      }

      .msg-meta {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-dim);
        margin-top: 4px;
        letter-spacing: 0.04em;
        padding: 0 4px;
      }

      /* System message */
      .system-msg {
        align-self: center;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-dim);
        letter-spacing: 0.06em;
        padding: 6px 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        animation: msgIn 0.3s ease;
      }

      /* ── INPUT AREA ── */
      .input-area {
        position: relative;
        z-index: 10;
        padding: 16px 28px 24px;
        border-top: 1px solid var(--border);
        background: rgba(8,11,15,0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        flex-shrink: 0;
      }

      .input-shell {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 6px 6px 6px 18px;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      .input-shell:focus-within {
        border-color: rgba(79,255,176,0.35);
        box-shadow: 0 0 0 3px rgba(79,255,176,0.06);
      }

      #msg {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text);
        font-family: var(--font-display);
        font-size: 14px;
        font-weight: 400;
        caret-color: var(--accent);
        min-height: 36px;
      }

      #msg::placeholder {
        color: var(--text-dim);
        font-family: var(--font-display);
      }

      .send-btn {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: var(--accent);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
        box-shadow: 0 0 16px var(--accent-glow);
      }

      .send-btn:hover {
        transform: scale(1.07);
        box-shadow: 0 0 24px var(--accent-glow);
      }

      .send-btn:active {
        transform: scale(0.94);
      }

      .send-btn svg {
        width: 17px;
        height: 17px;
        fill: #050f0a;
        transform: translateX(1px);
      }

      .input-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 10px;
        padding: 0 4px;
      }

      .connection-status {
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.06em;
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--text-dim);
        transition: background 0.3s;
      }

      .status-dot.online { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
      .status-dot.offline { background: #ff4466; }

      #status-text {
        color: var(--text-muted);
        transition: color 0.3s;
      }

      .hint {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-dim);
        letter-spacing: 0.04em;
      }

      /* Typing indicator */
      .typing-indicator {
        display: none;
        align-self: flex-start;
        padding: 11px 16px;
        background: var(--recv-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        border-bottom-left-radius: 5px;
        gap: 4px;
        align-items: center;
      }

      .typing-indicator.show { display: flex; }

      .typing-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--text-dim);
        animation: typingDot 1.2s ease-in-out infinite;
      }

      .typing-dot:nth-child(2) { animation-delay: 0.2s; }
      .typing-dot:nth-child(3) { animation-delay: 0.4s; }

      @keyframes typingDot {
        0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
        30% { transform: translateY(-4px); opacity: 1; }
      }

      /* Empty state */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        gap: 12px;
        color: var(--text-dim);
        user-select: none;
      }

      .empty-icon {
        font-size: 36px;
        opacity: 0.3;
      }

      .empty-state p {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>

    <!-- HEADER -->
    <header>
      <div class="header-left">
        <div class="avatar">
          K
          <span class="avatar-dot"></span>
        </div>
        <div class="header-info">
          <h1>Karan</h1>
          <p>● online — localhost:3000</p>
        </div>
      </div>
      <div class="header-right">
        <span class="header-badge">socket.io v4</span>
      </div>
    </header>

    <!-- MESSAGES -->
    <div id="messages-wrapper">
      <ul id="messages">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">◎</div>
          <p>No messages yet</p>
        </div>
      </ul>
    </div>

    <!-- INPUT -->
    <div class="input-area">
      <div class="input-shell">
        <input id="msg" placeholder="Type a message…" autocomplete="off" />
        <button class="send-btn" onclick="sendMessage()" title="Send">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
          </svg>
        </button>
      </div>
      <div class="input-footer">
        <div class="connection-status">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">connecting…</span>
        </div>
        <span class="hint">enter ↵ to send</span>
      </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
      const socket = io("http://localhost:3000");

      const messagesList = document.getElementById("messages");
      const statusDot    = document.getElementById("status-dot");
      const statusText   = document.getElementById("status-text");
      const emptyState   = document.getElementById("empty-state");

      let messageCount = 0;

      function setStatus(state) {
        statusDot.className = "status-dot " + state;
        if (state === "online") {
          statusText.textContent = "connected";
          statusText.style.color = "var(--accent)";
        } else if (state === "offline") {
          statusText.textContent = "disconnected";
          statusText.style.color = "#ff4466";
        } else {
          statusText.textContent = "connecting…";
          statusText.style.color = "var(--text-muted)";
        }
      }

      function getTime() {
        return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      function addMessage(text, type, label) {
        if (emptyState) emptyState.remove();

        const li = document.createElement("li");
        li.className = type;

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = text;

        const meta = document.createElement("div");
        meta.className = "msg-meta";
        meta.textContent = (label || (type === "sent" ? "you" : "them")) + " · " + getTime();

        li.appendChild(bubble);
        li.appendChild(meta);
        messagesList.appendChild(li);

        messageCount++;
        messagesList.scrollTop = messagesList.scrollHeight;
      }

      function addSystemMsg(text) {
        const div = document.createElement("div");
        div.className = "system-msg";
        div.textContent = text;
        messagesList.appendChild(div);
        messagesList.scrollTop = messagesList.scrollHeight;
      }

      socket.on("connect", () => {
        setStatus("online");
        addSystemMsg("connection established · " + socket.id.slice(0, 8) + "…");
      });

      socket.on("disconnect", () => {
        setStatus("offline");
        addSystemMsg("connection lost");
      });

      socket.on("connect_error", () => {
        setStatus("offline");
      });

      socket.on("receive_message", (msg) => {
        addMessage(msg, "received");
      });

      function sendMessage() {
        const input = document.getElementById("msg");
        const msg = input.value.trim();
        if (!msg) return;
        socket.emit("send_message", msg);
        addMessage(msg, "sent");
        input.value = "";
        input.focus();
      }

      document.getElementById("msg").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });


      
    </script>
  </body>
</html>
